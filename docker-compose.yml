services:
  postgres:
    image: postgres:16-alpine
    container_name: deepfake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepfake_db
      POSTGRES_USER: deepfake_user
      POSTGRES_PASSWORD: deepfake_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfake_user -d deepfake_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepfake-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: deepfake-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./ml_weights:/app/apps/detection/ml/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    container_name: deepfake-celery
    restart: unless-stopped
    command: celery -A deepfake_backend worker -l info
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./ml_weights:/app/apps/detection/ml/checkpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: deepfake-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
